<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geocoder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: monospace;
      background: #f5f5f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: white;
      border: 2px solid #222;
      padding: 32px;
      width: 100%;
      max-width: 480px;
    }
    h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 24px;
      text-transform: uppercase;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
      color: #555;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid #ddd;
      font-family: monospace;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #222; }
    input[readonly] {
      background: #f5f5f0;
      color: #333;
    }
    button {
      width: 100%;
      margin-top: 16px;
      padding: 12px;
      background: #222;
      color: white;
      border: none;
      font-family: monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #444; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    .field { margin-bottom: 16px; }
    #status {
      margin-top: 12px;
      font-size: 12px;
      color: #888;
      min-height: 18px;
    }
    #status.error { color: #c00; }
    #status.success { color: #060; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Geocoder</h1>

    <div class="field">
      <label for="address">Address</label>
      <input type="text" id="address" placeholder="e.g. 123 Main St, Albany, NY" />
    </div>

    <div class="field">
      <label for="coords">Longitude, Latitude</label>
      <input type="text" id="coords" readonly placeholder="— , —" />
    </div>

    <button id="btn" onclick="geocode()">Geocode</button>
    <div id="status"></div>
  </div>

  <script>
    async function geocode() {
      const address = document.getElementById('address').value.trim();
      const coordsInput = document.getElementById('coords');
      const status = document.getElementById('status');
      const btn = document.getElementById('btn');

      if (!address) {
        status.textContent = 'Please enter an address.';
        status.className = 'error';
        return;
      }

      btn.disabled = true;
      status.textContent = 'Looking up...';
      status.className = '';
      coordsInput.value = '';

      try {
        const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address)}&format=json&limit=1`;
        const res = await fetch(url, {
          headers: { 'Accept-Language': 'en' }
        });
        const data = await res.json();

        if (data.length === 0) {
          status.textContent = 'Address not found. Try being more specific.';
          status.className = 'error';
        } else {
          const { lon, lat } = data[0];
          coordsInput.value = `${parseFloat(lon).toFixed(6)}, ${parseFloat(lat).toFixed(6)}`;
          status.textContent = `✓ ${data[0].display_name}`;
          status.className = 'success';
        }
      } catch (e) {
        status.textContent = 'Network error. Check your connection.';
        status.className = 'error';
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById('address').addEventListener('keydown', e => {
      if (e.key === 'Enter') geocode();
    });
  </script>
</body>
</html>
